  responses:
    BadRequest:
      description: Invalid request or validation error.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/MessageError"
              - $ref: "#/components/schemas/ValidationError"
              - $ref: "#/components/schemas/RecaptchaError"
              - $ref: "#/components/schemas/InvalidEntriesError"
    Unauthorized:
      description: Missing, invalid, expired, or invalidated token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageError"
    Forbidden:
      description: Authenticated user does not have permission.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/MessageError"
              - $ref: "#/components/schemas/ForbiddenWithSuccess"
    NotFound:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageError"
    Conflict:
      description: Request conflicts with existing data or active commitments.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageError"
    ServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/ServerStringError"
              - $ref: "#/components/schemas/ServerObjectError"
              - $ref: "#/components/schemas/MessageError"
    ServiceUnavailable:
      description: Database connection failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServerObjectError"

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      responses:
        "200":
          description: API is running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register an account
      description: reCAPTCHA is skipped when NODE_ENV is dev or development.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /referee/races/{raceId}/entries:
    get:
      tags:
        - Referee
      summary: List entries for an assigned race
      description: Requires referee role. The referee must be assigned to the race.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RaceIdParam"
      responses:
        "200":
          description: Race entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/RefereeRaceEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /referee/races/{raceId}/entries/{entryId}/inspection:
    patch:
      tags:
        - Referee
      summary: Record a pre-race inspection outcome for a horse entry
      description: >-
        Requires referee role. The referee must be assigned to the race
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RaceIdParam"
        - name: entryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InspectEntryRequest"
      responses:
        "200":
          description: Inspection outcome recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entry:
                    $ref: "#/components/schemas/RefereeRaceEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /referee/races/{raceId}/report:
    get:
      tags:
        - Referee
      summary: Get the referee's race report
      description: Requires referee role. The referee must be assigned to the race. Initializes a draft report if one does not exist.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RaceIdParam"
      responses:
        "200":
          description: Referee race report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaceReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /referee/races/{raceId}/report/placements:
    put:
      tags:
        - Referee
      summary: Update race placements
      description: Requires referee role. Replaces all placements for the race. Report must be in draft status.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RaceIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlacementsRequest"
      responses:
        "200":
          description: Placements updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /referee/races/{raceId}/report/violations:
    post:
      tags:
        - Referee
      summary: Create a violation
      description: Requires referee role. Report must be in draft status. Disqualification severity updates the entry's finishStatus to dsq.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RaceIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateViolationRequest"
      responses:
        "201":
          description: Violation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Violation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
