openapi: 3.1.0

info:
  title: Horse Racing API
  version: 1.0.0
  description: Express REST API for horse racing tournaments, races, horses, profiles, and authentication.

servers:
  - url: http://localhost:8080/api
    description: Local development
  - url: https://horse-racing-api.patohru.qzz.io/api
    description: Production

tags:
  - name: Auth
  - name: Admin
  - name: Me
  - name: Profiles
  - name: Schedules
  - name: Races
  - name: Horses
  - name: Jockeys
  - name: Tournaments
  - name: Referee
  - name: Health

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    UserIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AdminUserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OwnerIdParam:
      name: ownerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    HorseIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TournamentIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AdminTournamentIdParam:
      name: tournamentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TournamentRegistrationIdParam:
      name: regId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RaceIdParam:
      name: raceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvitationIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Role:
      type: string
      enum:
        - admin
        - jockey
        - horse_owner
        - spectator
        - referee

    RegisterRole:
      type: string
      enum:
        - spectator
        - jockey
        - horse_owner

    UserStatus:
      type: string
      enum:
        - pending
        - active
        - locked

    TournamentStatus:
      type: string
      enum:
        - draft
        - upcoming
        - registration_open
        - registration_closed
        - ongoing
        - completed
        - cancelled

    PublicTournamentStatus:
      type: string
      enum:
        - upcoming
        - registration_open
        - registration_closed
        - ongoing
        - completed
        - cancelled

    RaceStatus:
      type: string
      enum:
        - draft
        - scheduled
        - pre_race
        - ongoing
        - under_review
        - result_confirmed
        - completed
        - postponed
        - cancelled

    PublicRaceStatus:
      type: string
      enum:
        - scheduled
        - pre_race
        - ongoing
        - under_review
        - result_confirmed
        - completed
        - postponed
        - cancelled

    EntryStatus:
      type: string
      enum:
        - pending
        - confirmed
        - scratched
        - withdrawn
        - did_not_finish
        - disqualified

    RegistrationStatus:
      type: string
      enum:
        - pending
        - approved
        - rejected

    InvitationStatus:
      type: string
      enum:
        - pending
        - accepted
        - declined
        - cancelled

    TrackCondition:
      type: string
      enum:
        - dry
        - wet
        - muddy

    Pagination:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 25
        totalPages:
          type: integer
          example: 3

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      oneOf:
        - $ref: "#/components/schemas/MessageError"
        - $ref: "#/components/schemas/ValidationError"
        - $ref: "#/components/schemas/ForbiddenWithSuccess"
        - $ref: "#/components/schemas/ServerStringError"
        - $ref: "#/components/schemas/ServerObjectError"
        - $ref: "#/components/schemas/RecaptchaError"
        - $ref: "#/components/schemas/InvalidEntriesError"

    MessageError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Invalid uuid

    ValidationError:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: Validation error
        errors:
          type: array
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Invalid email address

    RecaptchaError:
      type: object
      required:
        - message
        - codes
      properties:
        message:
          type: string
          example: reCaptcha verification failed
        codes:
          type: array
          items:
            type: string

    InvalidEntriesError:
      type: object
      required:
        - message
        - invalidIds
      properties:
        message:
          type: string
          example: Invalid entryIds not found in this race
        invalidIds:
          type: array
          items:
            type: string
            format: uuid

    ForbiddenWithSuccess:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum:
            - false
          example: false
        error:
          type: string
          example: Invalid user role

    ServerStringError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Internal Server Error

    ServerObjectError:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: SERVICE_UNAVAILABLE
            message:
              type: string
              example: Unable to connect to the database

    GenericObject:
      type: object
      additionalProperties: true

    RegisterRequest:
      type: object
      required:
        - fullName
        - email
        - password
        - role
      properties:
        fullName:
          type: string
          minLength: 2
          example: Jane Rider
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          minLength: 6
          example: secret123
        role:
          $ref: "#/components/schemas/RegisterRole"
        captchaToken:
          type: string
          description: Required outside dev/development NODE_ENV.

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: Account created
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          minLength: 1
          example: secret123
        captchaToken:
          type: string
          description: Required outside dev/development NODE_ENV.

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            full_name:
              type: string
            email:
              type: string
              format: email
            role:
              $ref: "#/components/schemas/Role"
            status:
              $ref: "#/components/schemas/UserStatus"

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type:
            - string
            - "null"
        address:
          type:
            - string
            - "null"
        avatar_url:
          type:
            - string
            - "null"
        avatarUrl:
          type:
            - string
            - "null"
        role:
          $ref: "#/components/schemas/Role"
        status:
          $ref: "#/components/schemas/UserStatus"
        weightKg:
          type:
            - string
            - "null"
        experienceYear:
          type:
            - integer
            - "null"
        createdAt:
          type:
            - string
            - "null"
          format: date-time
        updatedAt:
          type:
            - string
            - "null"
          format: date-time

    AdminUserListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/Role"
        status:
          $ref: "#/components/schemas/UserStatus"
        createdAt:
          type:
            - string
            - "null"
          format: date-time
        avatarUrl:
          type:
            - string
            - "null"

    AdminUserDetail:
      allOf:
        - $ref: "#/components/schemas/AdminUserListItem"
        - type: object
          properties:
            phone:
              type:
                - string
                - "null"
            address:
              type:
                - string
                - "null"
            updatedAt:
              type:
                - string
                - "null"
              format: date-time

    UpdateUserRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/Role"

    UpdateUserStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - active
            - locked

    UserMutationResponse:
      type: object
      properties:
        message:
          type: string
        userId:
          type: string
          format: uuid

    UpdateProfileRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: string
          maxLength: 15
        address:
          type: string
          maxLength: 225
        avatar_url:
          type: string
          format: uri

    UpdateProfileResponse:
      type: object
      properties:
        message:
          type: string
          example: Profile updated
        user:
          $ref: "#/components/schemas/UserProfile"
        token:
          type: string
          description: Returned when email or password changes.

    Horse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type:
            - string
            - "null"
          format: uuid
        name:
          type: string
        breed:
          type: string
        birthDate:
          type:
            - string
            - "null"
          format: date
        weightKg:
          type:
            - string
            - "null"
          example: "455.50"
        imageUrl:
          type:
            - string
            - "null"
        healthStatus:
          type:
            - string
            - "null"
        isRetired:
          type:
            - boolean
            - "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AddHorseRequest:
      type: object
      required:
        - name
        - breed
      properties:
        name:
          type: string
          minLength: 1
        breed:
          type: string
          minLength: 1
        birthDate:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          example: "2020-04-15"
        weightKg:
          type: string
          pattern: "^\\d+(\\.\\d{1,2})?$"
          example: "455.50"
        imageUrl:
          type: string
        healthStatus:
          type: string

    UpdateHorseRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        breed:
          type: string
          minLength: 1
        birthDate:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          example: "2020-04-15"
        weightKg:
          type: string
          pattern: "^\\d+(\\.\\d{1,2})?$"
          example: "455.50"
        imageUrl:
          type: string
        healthStatus:
          type: string

    Race:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tournamentId:
          type: string
          format: uuid
        name:
          type: string
        raceNumber:
          type:
            - integer
            - "null"
        roundNumber:
          type:
            - integer
            - "null"
        roundName:
          type:
            - string
            - "null"
        distanceMeters:
          type:
            - integer
            - "null"
        trackCondition:
          oneOf:
            - $ref: "#/components/schemas/TrackCondition"
            - type: "null"
        scheduledAt:
          type:
            - string
            - "null"
          format: date-time
        scheduleAt:
          type:
            - string
            - "null"
          format: date-time
        venue:
          type:
            - string
            - "null"
        laneCount:
          type:
            - integer
            - "null"
        status:
          $ref: "#/components/schemas/RaceStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RaceEntryHorse:
      type: object
      properties:
        id:
          type:
            - string
            - "null"
          format: uuid
        jockeyId:
          type:
            - string
            - "null"
          format: uuid
        jockeyName:
          type:
            - string
            - "null"
        name:
          type:
            - string
            - "null"
        breed:
          type:
            - string
            - "null"
        weightKg:
          type:
            - string
            - "null"
        entryStatus:
          oneOf:
            - $ref: "#/components/schemas/EntryStatus"
            - type: "null"
        laneNumber:
          type:
            - integer
            - "null"

    ScheduleRace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tournamentId:
          type: string
          format: uuid
        name:
          type: string
        scheduledAt:
          type:
            - string
            - "null"
          format: date-time
        venue:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/RaceStatus"

    Tournament:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"
        rules:
          type:
            - string
            - "null"
        location:
          type:
            - string
            - "null"
        startDate:
          type:
            - string
            - "null"
          format: date
        endDate:
          type:
            - string
            - "null"
          format: date
        registrationOpenDate:
          type:
            - string
            - "null"
          format: date-time
        registrationCloseDate:
          type:
            - string
            - "null"
          format: date-time
        maximumParticipants:
          type:
            - integer
            - "null"
        minimumParticipants:
          type:
            - integer
            - "null"
        prizePool:
          type:
            - number
            - "null"
        status:
          $ref: "#/components/schemas/TournamentStatus"
        createdBy:
          type: string
          format: uuid
        createdAt:
          type:
            - string
            - "null"
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TournamentListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        location:
          type:
            - string
            - "null"
        startDate:
          type:
            - string
            - "null"
          format: date
        endDate:
          type:
            - string
            - "null"
          format: date
        registrationOpenDate:
          type:
            - string
            - "null"
          format: date-time
        registrationCloseDate:
          type:
            - string
            - "null"
          format: date-time
        status:
          $ref: "#/components/schemas/TournamentStatus"

    CreateTournamentRequest:
      type: object
      required:
        - name
        - startDate
        - endDate
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        startDate:
          type: string
          format: date-time
          description: Parsed by the API as a date.
        endDate:
          type: string
          format: date-time
          description: Parsed by the API as a date.
        description:
          type: string
        rules:
          type: string
        location:
          type: string
          maxLength: 100
        registrationOpenDate:
          type: string
          format: date-time
        registrationCloseDate:
          type: string
          format: date-time
        maximumParticipants:
          type: integer
          minimum: 1
        minimumParticipants:
          type: integer
          minimum: 1
        prizePool:
          type: number
          exclusiveMinimum: 0

    UpdateTournamentRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        startDate:
          type: string
          format: date-time
          description: Parsed by the API as a date.
        endDate:
          type: string
          format: date-time
          description: Parsed by the API as a date.
        description:
          type: string
        rules:
          type: string
        location:
          type: string
          maxLength: 100
        registrationOpenDate:
          type: string
          format: date-time
        registrationCloseDate:
          type: string
          format: date-time
        maximumParticipants:
          type: integer
          minimum: 1
        minimumParticipants:
          type: integer
          minimum: 1
        prizePool:
          type: number
          exclusiveMinimum: 0

    UpdateTournamentStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - upcoming
            - registration_open
            - registration_closed
            - ongoing
            - completed
            - cancelled

    RegisterForTournamentRequest:
      type: object
      required:
        - horseId
      properties:
        horseId:
          type: string
          format: uuid

    TournamentRegistration:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          format: uuid
        tournamentId:
          type: string
          format: uuid
        horseId:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/RegistrationStatus"
        submittedAt:
          type:
            - string
            - "null"
          format: date-time
        reviewedBy:
          type:
            - string
            - "null"
          format: uuid
        reviewedAt:
          type:
            - string
            - "null"
          format: date-time
        rejectReason:
          type:
            - string
            - "null"

    InviteJockeyRequest:
      type: object
      required:
        - jockeyId
        - entryId
        - title
      properties:
        jockeyId:
          type: string
          format: uuid
        entryId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 5
        message:
          type: string

    JockeyInvitation:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          format: uuid
        invitationId:
          type: string
          format: uuid
        raceId:
          type: string
          format: uuid
        horseId:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        jockeyId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/InvitationStatus"
        invitedAt:
          type:
            - string
            - "null"
          format: date-time
        respondedAt:
          type:
            - string
            - "null"
          format: date-time

    TournamentRace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tournamentId:
          type: string
          format: uuid
        name:
          type: string
        roundName:
          type:
            - string
            - "null"
        distanceMeters:
          type:
            - integer
            - "null"
        trackCondition:
          oneOf:
            - $ref: "#/components/schemas/TrackCondition"
            - type: "null"
        scheduledAt:
          type:
            - string
            - "null"
          format: date-time
        venue:
          type:
            - string
            - "null"
        laneCount:
          type:
            - integer
            - "null"
        status:
          $ref: "#/components/schemas/RaceStatus"

    MeRaceListItem:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          format: uuid
        tournamentId:
          type: string
          format: uuid
        name:
          type: string
        roundName:
          type:
            - string
            - "null"
        distanceMeters:
          type:
            - integer
            - "null"
        scheduledAt:
          type:
            - string
            - "null"
          format: date-time
        venue:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/RaceStatus"

    PaginatedHorses:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Horse"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedTournaments:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TournamentListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedTournamentRaces:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TournamentRace"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedMeRaces:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MeRaceListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedRegistrations:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MeRegistrationItem"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedInvitations:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        pagination:
          $ref: "#/components/schemas/Pagination"

    PredictionStatus:
      type: string
      enum:
        - pending
        - correct
        - incorrect

    CreatePredictionRequest:
      type: object
      required:
        - predictedEntryId
        - predictedPosition
      properties:
        predictedEntryId:
          type: string
          format: uuid
          description: The race entry ID being bet on.
        predictedPosition:
          type: integer
          minimum: 1
          maximum: 3
          description: Predicted finishing position (1st, 2nd, or 3rd).

    Prediction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        race:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            distanceMeters:
              type:
                - integer
                - "null"
            scheduledAt:
              type:
                - string
                - "null"
              format: date-time
            venue:
              type:
                - string
                - "null"
            status:
              $ref: "#/components/schemas/RaceStatus"
        predictedEntry:
          type: object
          properties:
            entryId:
              type: string
              format: uuid
            horseName:
              type: string
        predictedPosition:
          type: integer
        placedAt:
          type: string
          format: date-time
        isCorrect:
          type:
            - boolean
            - "null"
        rewardAmount:
          type:
            - string
            - "null"

