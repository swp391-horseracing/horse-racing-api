services:
  postgres:
    image: postgres:latest
    container_name: horse-racing-database
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/18/docker
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - horse_racing_psql:/var/lib/postgresql
    networks:
      - api
  pgadmin:
    image: dpage/pgadmin4:9.8
    ports:
      - 5050:80
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: test123@gmail.com
      PGADMIN_DEFAULT_PASSWORD: test123

      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: 'False'

      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    networks:
      - api
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: horse-racing-cloudbeaver
    restart: on-failure:5
    ports:
      - 8978:8978
    volumes:
      - cloudbeaver:/opt/cloudbeaver/workspace
    networks:
      - api

volumes:
  horse_racing_psql:
  cloudbeaver:
networks:
  api:
    name: horse-racing-api
    external: true
